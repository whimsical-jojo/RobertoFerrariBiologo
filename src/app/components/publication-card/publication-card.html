<div class="mb-2 py-2">
    <p class="gray-600 text-sm md:text-base"> {{publication().authors}} ({{publication().year}})</p>
    <h2 class="semibold text-lg md:text-xl">
        @if (publication().url) {
        <a [href]="publication().url" class="text-primary hover:cursor-pointer hover:underline hover:text-secondary"
            target="_blank">
            {{publication().title}}
        </a>
        }
        @else {
        {{publication().title}}
        }
    </h2>
    <!-- Unnecessarily elegant solution that just wasted 10 minutes of my time just to avoid writing 3 @ifs-->
    <p class="pb-2">
        {{ [publication().context, publication().publisher, publication().location].filter(val=>!!val).join(', ')
        }}
    </p>
</div>
