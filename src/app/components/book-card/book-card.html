<!-- Image on the Right, Title and Subtitle, details underneath that, with buy button under that, and description with extension underneath-->
<div class="element-box
min-h-160 sm:min-h-110 md:min-h-140 lg:min-h-130">
    <div class="flex flex-col sm:flex-row items-start gap-6">
        <img [src]="book().imageUrl" alt="{{ book().title }} cover image
        " class="w-1/2 sm:w-1/3 aspect-3/4 max-w-60 my-4 object-cover shrink-0 shadow-md mx-auto select-none">
        <div class="">
            <!-- Title and Subtitle -->
            <div class="contents divide-y divide-gray-300 pb-4">
                <h1 class="text-primary text-xl md:text-2xl lg:text-3xl font-extrabold">{{ book().title }}</h1>
                <h2 class="text-gray-800 text-lg lg:text-xl mb-4">{{ book().subtitle }}</h2>
            </div>
            
            <!-- Button on top on mobile, underneath the description on desktop -->
            <div class="flex flex-col">
                <!-- Button to buy the book-->
                <a class="bg-primary text-white py-4 md:my-8 px-6 rounded-lg hover:bg-secondary transition-colors block
            mx-auto ease-in-out duration-200 w-full md:w-fit order-first md:order-last" [href]="book().linkUrl" target="_blank">{{
                    book().linkLabel}}</a>

                <!-- Description with extension -->
                <div>
                    <div [style.max-height]="!isOpen() ? '80px' : '2000px'"
                        class="overflow-hidden transition-all duration-600 ease-in-out mt-4">
                        <p class="h-full text-left md:text-justify">
                            {{book().description }}</p>
                    </div>

                    <!-- TODO find someway to add the gradient to the text-->


                    <button (click)="toggleDescription()"
                        class="text-primary hover:underline hover:text-secondary cursor-pointer text-sm font-medium">
                        <span>{{ !isOpen() ? 'Leggi tutto' : 'Riduci' }}</span>
                        <span class="inline-block transform transition-transform duration-200"
                            [class.rotate-180]="isOpen()">↓</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <p class="text-gray-600! text-xs sm:text-sm mt-4 sm:mt-0 max-sm:hidden">{{ book().details}}</p>
</div>
