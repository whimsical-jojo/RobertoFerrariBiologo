<div class="sm:grid sm:grid-cols-2 gap-4 element-box mb-4">
    @for(video of videos(); track video.id) {
    <div class="flex flex-col justify-between shadow-md p-1 rounded-lg">
        <h1 class="text-base sm:text-lg lg:text-xl font-semibold text-primary mt-2">{{ video.title }}</h1>

        <iframe [src]="video.url" class="w-full aspect-video shadow-md"></iframe>
    </div>
    }
</div>
