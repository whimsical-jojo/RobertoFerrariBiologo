<div class="element-box mb-4 flex flex-col md:flex-row-reverse items-start gap-6 md:gap-12">
    <div class="sticky-image-glue">
        <img src="./intervento.jpeg" alt="Lesson picture" class="sticky-image">
    </div>

    <div class="divide-y divide-primary/50">
        <h1>
            Prossimi interventi
        </h1>
        <div class="flex flex-col gap-2 divide-y divide-primary/50 pt-4">
            @for(event of futureEvents(); track event.id) {
            <!--Card for the event-->
            <app-event-card [event]="event"></app-event-card>
            }
        </div>
    </div>
</div>
<div class="element-box mb-4 flex flex-col md:flex-row items-start gap-6 md:gap-12">

    <div class="sticky-image-glue">
        <img src="./past.jpeg" alt="Waterfall picture" class="sticky-image">
    </div>

    <div class="divide-y divide-primary/50">
        <h1>
            Interventi passati
        </h1>
        <div class="flex flex-col gap-2 divide-y divide-primary/50 pt-4">
            @for(event of pastEvents(); track event.id) {
            <!--Card for the event-->
            <app-event-card [event]="event"></app-event-card>
            }
        </div>
    </div>
</div>
