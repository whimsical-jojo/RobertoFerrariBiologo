<div class="element-box divide-y divide-primary/50 mb-4">
    <h1>
        Prossimi interventi
    </h1>
    <div class="flex flex-col gap-2 divide-y divide-primary/50 pt-4">
        @for(event of futureEvents(); track event.id) {
        <!--Card for the event-->
        <app-event-card [event]="event"></app-event-card>
        }
    </div>
</div>
<div class="element-box divide-y divide-primary/50">
    <h1>
        Interventi passati
    </h1>
    <div class="flex flex-col gap-2 divide-y divide-primary/50 pt-4">
        @for(event of pastEvents(); track event.id) {
        <!--Card for the event-->
        <app-event-card [event]="event"></app-event-card>
        }
    </div>
</div>
