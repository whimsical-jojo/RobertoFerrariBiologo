<div class="mx-auto rounded-xl border-0.5 p-6 md:p-12 bg-white shadow-md items-center">
    <h1 class="text-xl md:text-2xl lg:text-3xl font-bold text-primary">
        Prossimi interventi
    </h1>
    <div class="flex flex-col gap-2 divide-y divide-primary/50 pt-4">
    @for(event of futureEvents(); track event.id) {
        <!--Card for the event-->
        <app-event-card [event]="event"></app-event-card>
    }
    </div>
    <h1 class="text-xl md:text-2xl lg:text-3xl font-bold text-primary">
        Interventi passati
    </h1>
    <div class="flex flex-col gap-2 divide-y divide-primary/50 pt-4">
    @for(event of pastEvents(); track event.id) {
        <!--Card for the event-->
        <app-event-card [event]="event"></app-event-card>
    }
    </div>
</div>
