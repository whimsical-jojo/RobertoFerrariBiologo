<!-- On top: Books with the scrolling component-->
<!-- On the left the pic with the first two paragraphs -->
<!-- On the right a preview of the video interviews-->
<div class="flex flex-col mb-12">
  <div>
    @if (books()) {
    <app-book-carousel [books]="books()!"></app-book-carousel>
    }
  </div>
  <div class="flex flex-col md:flex-row gap-4">
    <div class="flex flex-col items-start gap-3 w-full sm:w-1/2 relative">

      <app-vita [isPreview]="true"></app-vita>

      <button
        class="text-primary hover:underline hover:text-secondary cursor-pointer text-sm font-medium mt-1 absolute bottom-4 left-1/2 transform -translate-x-1/2">
        <a routerLink="/vita" routerLinkActive="active-link">
          Leggi tutta la biografia
        </a>
      </button>
    </div>
    <app-videos class="w-full sm:w-1/2 max-h-140 overflow-y-scroll"> </app-videos>
  </div>
</div>
